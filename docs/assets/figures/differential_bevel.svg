<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="title">
  <title id="title">Differential bevel gearbox — kinematic schematic</title>
  <style>
    .bg { fill: #1e1e2e; }
    .t   { fill: #cdd6f4; font-family: -apple-system, "Segoe UI", Arial, sans-serif; font-size: 14px; }
    .tb  { fill: #cdd6f4; font-family: -apple-system, "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 700; }
    .sub { fill: #a6adc8; font-family: -apple-system, "Segoe UI", Arial, sans-serif; font-size: 12px; }
    .lbl { fill: #f9e2af; font-family: ui-monospace, Consolas, monospace; font-size: 13px; }
    .fmt { fill: #a6e3a1; font-family: ui-monospace, Consolas, monospace; font-size: 14px; font-weight: 700; }
    .box { fill: #313244; stroke: #45475a; stroke-width: 1.5; rx: 8; ry: 8; }
    .servo { fill: #45475a; stroke: #89b4fa; stroke-width: 2; rx: 6; ry: 6; }
    .pinion { fill: #f5c2e7; stroke: #cdd6f4; stroke-width: 1; }
    .crown  { fill: #89b4fa; stroke: #cdd6f4; stroke-width: 1.5; }
    .head   { fill: #313244; stroke: #a6e3a1; stroke-width: 2.5; rx: 6; ry: 6; }
    .axis   { stroke: #f9e2af; stroke-width: 1.2; stroke-dasharray: 4 4; }
    .arr    { fill: #f9e2af; }
    .arrline { stroke: #f9e2af; stroke-width: 2; fill: none; }
    .outline { stroke: #a6e3a1; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="yarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arr"/>
    </marker>
    <marker id="garr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1"/>
    </marker>
  </defs>
  <rect class="bg" width="900" height="540"/>

  <text class="tb" x="450" y="30" text-anchor="middle">Differential bevel head — front view</text>
  <text class="sub" x="450" y="48" text-anchor="middle">two ST3215 servos driving one 40-tooth crown through two 20-tooth pinions</text>

  <!-- Left servo box -->
  <rect class="servo" x="60" y="220" width="120" height="90"/>
  <text class="tb" x="120" y="256" text-anchor="middle">ST3215 L</text>
  <text class="sub" x="120" y="274" text-anchor="middle">id 1</text>
  <text class="lbl" x="120" y="298" text-anchor="middle">θ_L</text>

  <!-- Right servo box -->
  <rect class="servo" x="720" y="220" width="120" height="90"/>
  <text class="tb" x="780" y="256" text-anchor="middle">ST3215 R</text>
  <text class="sub" x="780" y="274" text-anchor="middle">id 2</text>
  <text class="lbl" x="780" y="298" text-anchor="middle">θ_R</text>

  <!-- Left pinion (20 teeth) -->
  <circle class="pinion" cx="260" cy="265" r="42"/>
  <text class="sub" x="260" y="269" text-anchor="middle">20 T</text>

  <!-- Right pinion -->
  <circle class="pinion" cx="640" cy="265" r="42"/>
  <text class="sub" x="640" y="269" text-anchor="middle">20 T</text>

  <!-- Crown gear (40 teeth) -->
  <ellipse class="crown" cx="450" cy="265" rx="130" ry="38"/>
  <text class="tb" x="450" y="262" text-anchor="middle">Crown gear — 40 T</text>
  <text class="sub" x="450" y="282" text-anchor="middle">carries head</text>

  <!-- Shafts from servos to pinions -->
  <rect x="180" y="260" width="40" height="10" fill="#6c7086"/>
  <rect x="680" y="260" width="40" height="10" fill="#6c7086"/>

  <!-- Head (above crown) -->
  <rect class="head" x="370" y="100" width="160" height="110"/>
  <text class="tb" x="450" y="140" text-anchor="middle">Head</text>
  <text class="sub" x="450" y="160" text-anchor="middle">TFT face · camera</text>
  <text class="sub" x="450" y="178" text-anchor="middle">2-DOF: pan + tilt</text>

  <!-- Tilt arrow from head centre going up -->
  <path class="arrline" d="M 450 100 L 450 70" marker-end="url(#yarr)"/>
  <text class="lbl" x="458" y="78">tilt</text>

  <!-- Pan (left/right) from head -->
  <path class="arrline" d="M 370 155 L 330 155" marker-end="url(#yarr)"/>
  <path class="arrline" d="M 530 155 L 570 155" marker-end="url(#yarr)"/>
  <text class="lbl" x="320" y="148" text-anchor="end">pan (−)</text>
  <text class="lbl" x="580" y="148">pan (+)</text>

  <!-- Motor rotation arrows (arcs) -->
  <!-- Left motor θ_L: arc on pinion -->
  <path class="arrline" d="M 240 230 A 20 20 0 0 1 280 230" marker-end="url(#yarr)"/>
  <text class="lbl" x="298" y="235">θ_L</text>

  <!-- Right motor θ_R: arc on pinion -->
  <path class="arrline" d="M 620 230 A 20 20 0 0 1 660 230" marker-end="url(#yarr)"/>
  <text class="lbl" x="598" y="235" text-anchor="end">θ_R</text>

  <!-- Base -->
  <rect class="box" x="200" y="330" width="500" height="40"/>
  <text class="sub" x="450" y="355" text-anchor="middle">3D-printed PLA mount · rigid base</text>

  <!-- Equations box -->
  <rect class="box" x="60" y="400" width="780" height="120"/>
  <text class="tb"  x="80" y="428">Differential kinematics (G = crown ÷ pinion = 40 ÷ 20 = 2)</text>
  <text class="fmt" x="80" y="458">Forward:  pitch = (θ_L + θ_R) / (2·G)        pan   = (θ_L − θ_R) / (2·G)</text>
  <text class="fmt" x="80" y="484">Inverse:  θ_L   =  G · (pitch + pan)          θ_R   =  G · (pitch − pan)</text>
  <text class="sub" x="80" y="506">Tilt: motors same direction.  Pan: motors opposite directions.  Ticks/rev = 4096 (ST3215).</text>
</svg>
