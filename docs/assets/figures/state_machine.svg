<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 540" role="img" aria-labelledby="title">
  <title id="title">Conversation state machine</title>
  <style>
    .bg    { fill: #ffffff; }
    .state { fill: #f2f3f7; stroke: #7a7d8a; stroke-width: 1.2; rx: 8; ry: 8; }
    .active{ fill: #dbe6ff; stroke: #1e66f5; stroke-width: 2; rx: 8; ry: 8; }
    .rec   { fill: #fff3d6; stroke: #b3741a; stroke-width: 1.5; rx: 8; ry: 8; stroke-dasharray: 4 3; }

    .tb    { fill: #1e1e2e; font-family: -apple-system, "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 700; }
    .sub   { fill: #4b4f5a; font-family: -apple-system, "Segoe UI", Arial, sans-serif; font-size: 11px; }
    .title { fill: #1e1e2e; font-family: -apple-system, "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 700; }

    .canon { stroke: #2f8f3c; stroke-width: 2.2; fill: none; }
    .ret   { stroke: #1e66f5; stroke-width: 1.8; fill: none; }
    .err   { stroke: #8c8fa1; stroke-width: 1.4; fill: none; stroke-dasharray: 5 3; }

    .hl    { fill: #2f8f3c; font-family: ui-monospace, Consolas, monospace; font-size: 11px; font-weight: 700; }
    .retl  { fill: #1e66f5; font-family: ui-monospace, Consolas, monospace; font-size: 12px; font-weight: 600; }
    .errl  { fill: #5a5d6a; font-family: -apple-system, "Segoe UI", Arial, sans-serif; font-size: 11px; }

    .lblbg { fill: #ffffff; }

    .arrg { fill: #2f8f3c; }
    .arrb { fill: #1e66f5; }
    .arrm { fill: #8c8fa1; }
  </style>
  <defs>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrg"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrb"/>
    </marker>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrm"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="540"/>

  <!-- Title -->
  <text class="title" x="590" y="26" text-anchor="middle">Conversation state machine</text>
  <text class="sub"   x="590" y="46" text-anchor="middle">canonical turn (green) · return to idle (blue) · interrupt and error (dashed)</text>

  <!-- ═════════ MAIN ROW OF STATES (y 190..280) ═════════ -->
  <!-- Wider horizontal gaps between boxes (90 px) so the arrow labels fit cleanly -->
  <!-- Box widths 150-200, gaps 90 -->

  <!-- IDLE_WATCHING (active start state, blue border) -->
  <rect class="active" x="30"  y="190" width="160" height="90"/>
  <text class="tb"  x="110" y="225" text-anchor="middle">IDLE_WATCHING</text>
  <text class="sub" x="110" y="245" text-anchor="middle">camera + mic on</text>
  <text class="sub" x="110" y="262" text-anchor="middle">face tracking</text>

  <!-- LISTENING -->
  <rect class="state" x="280" y="190" width="150" height="90"/>
  <text class="tb"  x="355" y="225" text-anchor="middle">LISTENING</text>
  <text class="sub" x="355" y="245" text-anchor="middle">VAD speech start</text>
  <text class="sub" x="355" y="262" text-anchor="middle">buffering PCM</text>

  <!-- CAPTURING_INTENT -->
  <rect class="state" x="520" y="190" width="190" height="90"/>
  <text class="tb"  x="615" y="225" text-anchor="middle">CAPTURING_INTENT</text>
  <text class="sub" x="615" y="245" text-anchor="middle">VAD end → STT</text>
  <text class="sub" x="615" y="262" text-anchor="middle">engagement gate</text>

  <!-- THINKING -->
  <rect class="state" x="800" y="190" width="150" height="90"/>
  <text class="tb"  x="875" y="225" text-anchor="middle">THINKING</text>
  <text class="sub" x="875" y="245" text-anchor="middle">LLM generate</text>
  <text class="sub" x="875" y="262" text-anchor="middle">streaming tokens</text>

  <!-- SPEAKING -->
  <rect class="state" x="1000" y="190" width="150" height="90"/>
  <text class="tb"  x="1075" y="225" text-anchor="middle">SPEAKING</text>
  <text class="sub" x="1075" y="245" text-anchor="middle">TTS to speaker</text>
  <text class="sub" x="1075" y="262" text-anchor="middle">face visemes</text>

  <!-- ═════════ CANONICAL ARROWS (green, y=235) ═════════ -->
  <path class="canon" d="M 190 235 L 280 235" marker-end="url(#g)"/>
  <rect class="lblbg" x="205" y="218" width="66" height="14"/>
  <text class="hl" x="238" y="229" text-anchor="middle">speech start</text>

  <path class="canon" d="M 430 235 L 520 235" marker-end="url(#g)"/>
  <rect class="lblbg" x="446" y="218" width="59" height="14"/>
  <text class="hl" x="475" y="229" text-anchor="middle">speech end</text>

  <path class="canon" d="M 710 235 L 800 235" marker-end="url(#g)"/>
  <rect class="lblbg" x="726" y="218" width="58" height="14"/>
  <text class="hl" x="755" y="229" text-anchor="middle">transcript</text>

  <path class="canon" d="M 950 235 L 1000 235" marker-end="url(#g)"/>
  <rect class="lblbg" x="954" y="218" width="43" height="14"/>
  <text class="hl" x="975" y="229" text-anchor="middle">tokens</text>

  <!-- ═════════ RETURN TO IDLE (blue arc across the top, y=90..190) ═════════ -->
  <path class="ret" d="M 1075 190 C 1075 80, 110 80, 110 190" marker-end="url(#b)"/>
  <rect class="lblbg" x="515" y="68" width="150" height="16"/>
  <text class="retl" x="590" y="80" text-anchor="middle">done → IDLE_WATCHING</text>

  <!-- ═════════ RECOVERING BOX (dashed, below the row, clearly separated, y=400..460) ═════════ -->
  <rect class="rec" x="520" y="400" width="190" height="60"/>
  <text class="tb"  x="615" y="426" text-anchor="middle">RECOVERING</text>
  <text class="sub" x="615" y="444" text-anchor="middle">error / cancel path</text>

  <!-- ═════════ ERROR PATH (dashed, THINKING  →  RECOVERING, simple L-bend) ═════════ -->
  <path class="err" d="M 875 280 L 875 340 L 710 340 L 710 400" marker-end="url(#m)"/>
  <rect class="lblbg" x="790" y="332" width="62" height="14"/>
  <text class="errl" x="821" y="343" text-anchor="middle">error path</text>

  <!-- ═════════ RECOVERED PATH (RECOVERING → IDLE_WATCHING) ═════════ -->
  <path class="err" d="M 520 430 L 110 430 L 110 280" marker-end="url(#m)"/>
  <rect class="lblbg" x="200" y="422" width="200" height="14"/>
  <text class="errl" x="300" y="433" text-anchor="middle">recovered → IDLE_WATCHING</text>

  <!-- ═════════ BARGE-IN (dashed, SPEAKING → LISTENING, low arc routed BELOW the main row but ABOVE the RECOVERING path) ═════════ -->
  <path class="err" d="M 1075 280 C 1075 340, 355 340, 355 280" marker-end="url(#m)"/>
  <rect class="lblbg" x="560" y="348" width="250" height="14"/>
  <text class="errl" x="685" y="359" text-anchor="middle">barge-in or new speech → LISTENING</text>

  <!-- ═════════ LEGEND (bottom, clear of every path) ═════════ -->
  <g transform="translate(30, 500)">
    <rect x="0"   y="-7" width="18" height="4" fill="#2f8f3c"/>
    <text class="sub" x="26" y="0">canonical turn</text>
    <rect x="150" y="-7" width="18" height="4" fill="#1e66f5"/>
    <text class="sub" x="176" y="0">return to idle</text>
    <rect x="290" y="-8" width="18" height="2" fill="#8c8fa1" stroke="#8c8fa1" stroke-dasharray="4 3"/>
    <text class="sub" x="316" y="0">interrupt or error</text>
  </g>
</svg>
