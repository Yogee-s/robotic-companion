; PlatformIO project for the Diymore ESP32 2.8" 240x320 touchscreen.
;
; Board: ESP32-WROOM-32 (generic), ILI9341 TFT, XPT2046 resistive touch.
;
;   pio run                  ; build
;   pio run -t upload        ; flash (make sure /dev/ttyUSB0 is present)
;   pio device monitor       ; view serial output

[env:esp32dev]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
; upload_port / monitor_port left unset so PlatformIO picks the right
; /dev/tty* automatically. If multiple devices confuse it, run the
; wrapper which probes + prompts unplug/replug:
;
;     bash ../../scripts/flash_firmware.sh
;
; (or set PLATFORMIO_UPLOAD_PORT=/dev/ttyCH341USB0 pio run -t upload)
monitor_speed = 115200
upload_speed = 460800
; CYD-family boards often need a slower handshake.
upload_flags =
    --before=default_reset
    --after=hard_reset
build_flags =
    -D USER_SETUP_LOADED=1
    ; TFT_eSPI pinout for Diymore 2.8" CYD-style board
    -D ILI9341_2_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    ; Touch (XPT2046) shares SPI bus on many CYD clones
    -D TOUCH_CS=33
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D LOAD_GFXFF=1
    -D LOAD_GLCD=1
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
